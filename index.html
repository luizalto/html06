<html lang="pt-br">
<head>

<script>

n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];

}(window, document,'script',

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrir Shopee</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background-color: #E74B2E;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

.botao {
  background: white;
  color: #E74B2E;
  padding: 20px 60px;
  font-size: 26px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<a href="#" id="btnShopee" class="botao">
Abrir a Shopee
</a>

<script>
(function(){

// ============================
// 🔥 PEGAR PARÂMETROS
// ============================

const params = new URLSearchParams(window.location.search);

let LINK_SHOPEE = null;
let UC = null;

// 🔥 MODO 1 (RECOMENDADO): dest=LINK|||UC
const raw = params.get("dest");

if (raw && raw.includes("|||")) {
  const partes = raw.split("|||");
  LINK_SHOPEE = partes[0];
  UC = partes[1];
}

// 🔥 MODO 2 (fallback): dest=LINK&uc=XXX
if (!LINK_SHOPEE) {
  LINK_SHOPEE = params.get("dest");
  UC = params.get("uc");
}

// ============================
// ❌ VALIDAÇÃO
// ============================

if (!LINK_SHOPEE || !UC) {
  alert("Erro: link ou UC não informado.");
  throw new Error("Parâmetros inválidos");
}

// ============================
// 🔘 CLIQUE
// ============================

document.getElementById("btnShopee").addEventListener("click", function(e){
  e.preventDefault();

  const btn = this;
  btn.innerText = "Redirecionando...";

  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const largura = rect.width;

  let pos;

  const inicioCentro = largura * 0.45;
  const fimCentro = largura * 0.55;

  if (x < inicioCentro) {
    pos = "Left";
  } 
  else if (x > fimCentro) {
    pos = "Right";
  } 
  else {
    pos = "Center";
  }

  // ============================
  // 📊 EVENTOS META
  // ============================

  fbq('trackCustom', 'ClickShopee', {
    position: pos,
    uc: UC
  });

  if (pos === "Left") {
    fbq('trackCustom', 'ClickShopee_Left');
  } else if (pos === "Center") {
    fbq('trackCustom', 'ClickShopee_Center');
  } else {
    fbq('trackCustom', 'ClickShopee_Right');
  }

  // Evento padrão (melhora otimização)
  fbq('track', 'InitiateCheckout');

  // ============================
  // 🔗 REDIRECIONAMENTO
  // ============================

  const link = encodeURIComponent(LINK_SHOPEE);

  const finalURL = `https://shopee-utm-tracker.onrender.com/?link=${link}&pos=${pos}&uc=${UC}`;

  console.log("LINK:", LINK_SHOPEE);
  console.log("UC:", UC);
  console.log("POS:", pos);
  console.log("REDIRECT:", finalURL);

  // Delay pra garantir envio pro Meta
  setTimeout(() => {
    window.location.href = finalURL;
  }, 150);

});

})();
</script>

</body>
</html>
